  }
  window.addEventListener("error", function (e) {
    if (e && e.target && e.target.tagName === "SCRIPT") {
      // Optionale Skripte (z. B. Supabase) behandeln ihren Ladefehler selbst
      if (e.target.getAttribute && e.target.getAttribute("data-optional")) return;
      showError("Eine Skript-Datei konnte nicht geladen werden:\n" + (e.target.src || "unbekannt") + "\n\nBitte Internetverbindung prüfen (WLAN/Mobilfunk wechseln) und neu laden.");

      showError(e.message + (e.filename ? ("\n" + e.filename + ":" + e.lineno) : ""));
    }
  }, true);
  window.addEventListener("unhandledrejection", function (e) {
    showError(e && e.reason ? String(e.reason) : "Unbekannter Fehler (Promise)");
  });
</script>

function ageLabel(birthdate) {
    if (!birthdate)
        return "";
    const b = parseISO(birthdate);
    const now = new Date();
    if (b > now)
        return "";
    let months = (now.getFullYear() - b.getFullYear()) * 12 + (now.getMonth() - b.getMonth());
    if (now.getDate() < b.getDate())
        months--;
    if (months <= 0) {
        const days = Math.floor((now - b) / 86400000);

function parseCSV(text) {
    text = text.replace(/^\uFEFF/, "");
    const rows = [];
    let row = [];
    let field = "";
    let inQ = false;
    let i = 0;
    while (i < text.length) {
        const c = text[i];
        if (inQ) {
            if (c === '"') {
                if (text[i + 1] === '"') {
                    field += '"';
                    i += 2;
                    continue;
                }
                inQ = false;
                i++;
                continue;
            }
            field += c;
            i++;
            continue;
        }
        else {
            if (c === '"') {
                inQ = true;
                i++;
                continue;
            }
            if (c === ",") {
                row.push(field);
                field = "";
                i++;
                continue;
            }
            if (c === "\r") {
                i++;
                continue;
            }
            if (c === "\n") {
                row.push(field);
                rows.push(row);
                row = [];
                field = "";
                i++;
                continue;
            }
            field += c;
            i++;
            continue;
        }
    }
    row.push(field);
    rows.push(row);
    return rows.filter((r) => !(r.length === 1 && r[0] === ""));
}

function StepSlider({ value, onChange }) {
    const ref = useRef(null);
    const idx = Math.max(0, SEV_STEPS.indexOf(value || ""));
    const word = idx > 0 ? SEV_STEPS[idx] : "";
    const pick = (clientX) => {
        const r = ref.current.getBoundingClientRect();
        const rel = (clientX - r.left) / r.width;
        const i = Math.min(4, Math.max(0, Math.round((rel - 0.1) / 0.2)));
        onChange(SEV_STEPS[i]);
    };
    const pos = (i) => 10 + i * 20;
    return h("div", null,
        h("div", {
            className: "slider",
            ref,
            onPointerDown: (e) => { try { ref.current.setPointerCapture(e.pointerId); } catch (_) { } pick(e.clientX); },
            onPointerMove: (e) => { if (e.buttons) pick(e.clientX); },
        },
            h("div", { className: "strack" }),
            idx > 0 && h("div", { className: "sfill sev-" + word, style: { left: "10%", width: (idx * 20) + "%" } }),
            [0, 1, 2, 3, 4].map((i) => h("span", { key: i, className: "sdot", style: { left: pos(i) + "%" } })),
            h("span", { className: "sthumb " + (idx > 0 ? "sev-" + word : "sneutral"), style: { left: pos(idx) + "%" } })),
        h("div", { className: "sliderlabels" }, ["–", "kein", "bisschen", "mittel", "viel"].map((l, i) => h("span", { key: l, className: i === idx ? "on" : "" }, l))));
}

        const keys = Object.keys(ent);
        const min = keys.length ? keys.sort()[0] : today;

function InstantPicker({ catalog, selected, existing, onSelect, onRemove, placeholder }) {
    const [q, setQ] = useState("");

    const options = catalog.filter((c) => !taken.has(c.toLowerCase()) && c.toLowerCase().includes(qt.toLowerCase()));
    const canFree = qt.length > 0
        && !taken.has(qt.toLowerCase())
        && !catalog.some((c) => c.toLowerCase() === qt.toLowerCase());
    const pick = (label) => { onSelect(label); setQ(""); };
    return h("div", { className: "picker" },
        selected.length > 0 && h("div", { className: "badgewrap" },
            selected.map((l) => h("button", { key: l, className: "pickbadge", onClick: () => onRemove(l) }, l, h("span", { className: "bx" }, "✕")))),
        h("input", { className: "modalinput", value: q, placeholder: placeholder || "Suchen oder Neues eintippen…", onChange: (e) => setQ(e.target.value), onKeyDown: (e) => { if (e.key === "Enter" && canFree)

function AuthScreen({ client }) {
    const [mode, setMode] = useState("login");
    const [email, setEmail] = useState("");
    const [pw, setPw] = useState("");
    const [msg, setMsg] = useState(null);
    const [busy, setBusy] = useState(false);
    async function submit() {
        if (!email.trim() || (mode !== "reset" && pw.length < 6)) {
            setMsg({ ok: false, t: "Bitte E-Mail und Passwort (mind. 6 Zeichen) eingeben." });
            return;
        }
        setBusy(true);
        setMsg(null);
        try {
            if (mode === "login") {
                const { error } = await client.auth.signInWithPassword({ email: email.trim(), password: pw });
                if (error)
                    setMsg({ ok: false, t: error.message.includes("not confirmed") ? "E-Mail noch nicht bestätigt — bitte klicke zuerst den Link in der Bestätigungs-Mail." : "Anmeldung fehlgeschlagen: " + error.message });
            }
            else if (mode === "register") {
                const { data, error } = await client.auth.signUp({ email: email.trim(), password: pw });
                if (error)
                    setMsg({ ok: false, t: "Registrierung fehlgeschlagen: " + error.message });
                else if (!data.session)
                    setMsg({ ok: true, t: "Fast geschafft! Wir haben dir eine Bestätigungs-E-Mail geschickt. Bitte klicke den Link darin und melde dich danach hier an." });
            }
            else {
                const { error } = await client.auth.resetPasswordForEmail(email.trim(), { redirectTo: location.origin + location.pathname });
                setMsg(error ? { ok: false, t: error.message } : { ok: true, t: "E-Mail zum Zurücksetzen wurde verschickt." });
            }
        }
        catch (e) {
            setMsg({ ok: false, t: "Netzwerkfehler — bitte Internetverbindung prüfen." });
        }
        setBusy(false);
    }
    return h("div", { className: "setup" },
        h("div", { className: "setuphead" },
            h("div", { className: "setuplogo" }, "🍼"),
            h("h1", null, "Ernährungstagebuch"),

            h("div", { className: "authtabs" },
                h("button", { className: "authtab" + (mode === "login" ? " on" : ""), onClick: () => { setMode("login"); setMsg(null); } }, "Anmelden"),
                h("button", { className: "authtab" + (mode === "register" ? " on" : ""), onClick: () => { setMode("register"); setMsg(null); } }, "Registrieren")),
            h("label", { className: "flabel" }, "E-Mail"),
            h("input", { className: "modalinput", type: "email", autoComplete: "email", value: email, placeholder: "du@beispiel.de", onChange: (e) => setEmail(e.target.value) }),
            mode !== "reset" && h(React.Fragment, null,
                h("label", { className: "flabel" }, "Passwort"),
                h("input", { className: "modalinput", type: "password", autoComplete: mode === "login" ? "current-password" : "new-password", value: pw, placeholder: "mind. 6 Zeichen", onChange: (e) => setPw(e.target.value), onKeyDown: (e) => { if (e.key === "Enter")
                        submit(); } })),
            msg && h("p", { className: msg.ok ? "okmsg" : "errmsg" }, msg.t),
            h("button", { className: "btn primary wide", disabled: busy, onClick: submit }, busy ? "Bitte warten…" : mode === "login" ? "Anmelden" : mode === "register" ? "Konto erstellen" : "Link schicken"),
            mode === "login" && h("button", { className: "linkbtn", onClick: () => { setMode("reset"); setMsg(null); } }, "Passwort vergessen?"),
            mode === "reset" && h("button", { className: "linkbtn", onClick: () => { setMode("login"); setMsg(null); } }, "Zurück zur Anmeldung"),
            mode === "register" && h("p", { className: "hint", style: { marginTop: "10px" } }, "Nach der Registrierung bekommst du eine E-Mail mit Bestätigungslink (Double-Opt-In).")));

function CsvModal({ csv, onClose }) {
    const taRef = useRef(null);
    const [copied, setCopied] = useState(false);
    const copy = async () => {
        try {
            await navigator.clipboard.writeText(csv);
            setCopied(true);
        }
        catch (e) {
            try {
                if (taRef.current) {
                    taRef.current.select();
                    document.execCommand("copy");

    return h(Sheet, { onClose },

// ================= Analyse =================
function analyzeStructured(entries, orderedDates, symptoms, foods, nems) {
    // Alle NEM, die irgendwo eingetragen wurden (auch bereits gelöschte Optionen)
    const nemUsed = new Set(nems.map((n) => n.label));
    orderedDates.forEach((d) => ((entries[d] || {}).nem || []).forEach((x) => nemUsed.add(x)));
    const sevRows = symptoms.filter((s) => s.type === "sev");
    const inputCols = [
        ...foods.map((f) => ({ id: f.id, label: f.label, kind: "check" })),
        ...[...nemUsed].map((n) => ({ id: n, label: "NEM: " + n, kind: "nem" })),
    ];
    const load = {}, hasData = {}, constip = {}, idx = {};
    orderedDates.forEach((d, i) => (idx[d] = i));
    orderedDates.forEach((d) => {
        const e = entries[d] || {};
        let sum = 0, has = false;
        sevRows.forEach((c) => { const n = sevVal(e[c.id]); if (n !== null) {
            sum += n;
            has = true;
        } });
        load[d] = sum;
        hasData[d] = has;
        constip[d] = e.verstopfung === false;
    });
    const dataDays = orderedDates.filter((d) => hasData[d]);
    const out = { dataDays: dataDays.length, enough: dataDays.length >= 5, suspects: [], calm: [], tooOften: [], notUsed: [] };
    if (!out.enough)
        return out;
    const results = [];
    inputCols.forEach((col) => {
        const consumed = new Set();
        orderedDates.forEach((d) => {
            const e = entries[d] || {};
            if (col.kind === "nem") {
                if ((e.nem || []).includes(col.id))
                    consumed.add(d);
            }
            else if (e[col.id] === true)
                consumed.add(d);
        });
        if (consumed.size === 0) {
            out.notUsed.push(col.label);
            return;
        }
        let expSum = 0, expN = 0, unSum = 0, unN = 0, expC = 0, unC = 0;
        dataDays.forEach((d) => {
            const i = idx[d];
            let exposed = false;
            for (let k = 0; k <= 3; k++) {
                const pd = orderedDates[i - k];
                if (pd && consumed.has(pd)) {
                    exposed = true;
                    break;
                }
            }
            if (exposed) {
                expSum += load[d];
                expN++;
                if (constip[d])
                    expC++;
            }
            else {
                unSum += load[d];
                unN++;
                if (constip[d])
                    unC++;
            }
        });
        if (expN < 2 || unN < 2) {
            if (expN >= 2 && unN < 2)
                out.tooOften.push(col.label);
            return;
        }
        const me = expSum / expN, mu = unSum / unN;
        results.push({ label: col.label, diff: me - mu, me, mu, constFlag: expC / expN - unC / unN > 0.25 });
    });
    results.sort((a, b) => b.diff - a.diff);
    out.suspects = results.filter((r) => r.diff > 0.5);
    out.calm = results.filter((r) => r.diff < -0.5).sort((a, b) => a.diff - b.diff);
    return out;
}

      .setupsub { margin: 6px 0 0; font-size: 13.5px; color: var(--mut); }
      .setupdots { display: flex; justify-content: center; gap: 8px; margin: 18px 0 4px; }
      .sdot2 { width: 9px; height: 9px; border-radius: 50%; background: var(--surface2); }
      .sdot2.on { background: var(--lime); }
      .sdot2.done { background: rgba(195,214,63,.45); }
      .setupcard { background: var(--surface); border-radius: 22px; padding: 18px 16px; margin-top: 12px; }
      .setuptitle { margin: 0 0 12px; font-size: 16.5px; font-weight: 800; }
      .setupform .flabel { margin-top: 12px; }
      .flabel { display: block; font-size: 12px; font-weight: 700; color: var(--mut); margin: 10px 0 5px; }
      .genderrow { display: flex; gap: 8px; }
      .typerow { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
      .typerow .flabel { margin: 0; }
      .setupgrid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
      .setupgrid + .setupgrid { margin-top: 8px; }
      .setupgrid2 { display: grid; grid-template-columns: 1fr 1fr; }
      .setupgrid2 .setupchip { width: 100%; text-align: left; }
      .setupchip { border-color: var(--line); color: var(--ink); }
      .setupchip.yes { background: var(--lime); border-color: var(--lime); color: var(--lime-ink); }
      .setupwarn { margin: 10px 0 0; font-size: 12.5px; color: #ffb27d; font-weight: 600; }
      .setupnav { display: flex; justify-content: space-between; gap: 10px; margin-top: 14px; }
      .setupnav .btn { min-width: 110px; padding: 13px; }
      .addrow { display: flex; gap: 6px; margin-top: 12px; }
      .addrow .modalinput { flex: 1; }
      /* Suchauswahl mit Katalog */
      .picker { margin-top: 4px; }
      .pickerlist { max-height: 216px; overflow-y: auto; margin-top: 8px; border: 1px solid var(--line); border-radius: 12px; padding: 4px; background: var(--surface2); }
      .pickrow { display: flex; align-items: center; gap: 10px; width: 100%; border: none; background: transparent; color: var(--ink); padding: 9px 10px; border-radius: 9px; font-size: 13.5px; font-weight: 600; cursor: pointer; text-align: left; }
      .pickrow.on { background: rgba(195,214,63,.12); }
      .pickrow.free { color: var(--lime); }
      .pickbox { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--mut); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; flex: 0 0 auto; color: var(--mut); font-weight: 800; }
      .badgewrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
      .pickbadge { display: inline-flex; align-items: center; gap: 7px; background: var(--lime); color: var(--lime-ink); border: none; border-radius: 999px; padding: 8px 13px; font-size: 13.5px; font-weight: 800; cursor: pointer; }
      .pickbadge .bx { font-size: 11px; opacity: .65; }

      .authtabs { display: flex; background: var(--surface2); border-radius: 999px; padding: 3px; margin-bottom: 6px; }
      .authtab { flex: 1; border: none; background: transparent; color: var(--mut); font-size: 13.5px; font-weight: 800; padding: 9px 0; border-radius: 999px; cursor: pointer; }
      .authtab.on { background: var(--lime); color: var(--lime-ink); }
      .linkbtn { border: none; background: transparent; color: var(--mut); font-size: 12.5px; font-weight: 700; margin-top: 12px; cursor: pointer; text-decoration: underline; width: 100%; }

      /* Sheets */
      .sheet-bg { position: fixed; inset: 0; background: rgba(5,8,15,.6); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
      .sheet { background: var(--surface); color: var(--ink); width: 100%; max-width: 460px; max-height: 88vh; overflow-y: auto; border-radius: 20px 20px 0 0; padding: 10px 16px 20px; box-shadow: 0 -8px 30px rgba(0,0,0,.4); animation: up .18s ease; }
      .grab { width: 38px; height: 4px; border-radius: 2px; background: var(--surface2); margin: 2px auto 10px; }
      @keyframes up { from { transform: translateY(20px); opacity: .6 } to { transform: none; opacity: 1 } }
      .sheet-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 15px; }
      .x { border: none; background: var(--surface2); color: var(--mut); width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; }
      .btn { border: 1px solid var(--line); background: var(--surface2); color: var(--ink); padding: 9px 13px; border-radius: 14px; font-size: 13.5px; font-weight: 700; cursor: pointer; }
      .btn:active { transform: translateY(1px); }
      .btn.primary { background: var(--lime); color: var(--lime-ink); border-color: var(--lime); }
      .btn.wide { width: 100%; margin-top: 10px; padding: 13px; }
      .btn.danger { color: #ff8f8f; border-color: #5c3038; background: transparent; }
      .btn:disabled { opacity: .45; cursor: default; }
      .settingsec { margin: 16px 0 4px; font-size: 12px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--mut); }
      .menuitem { display: flex; align-items: center; gap: 12px; width: 100%; border: 1px solid var(--line); background: transparent; color: var(--ink); border-radius: 16px; padding: 13px; margin-bottom: 8px; cursor: pointer; text-align: left; }
      .mi-ic { font-size: 20px; }
      .mi-tx { display: flex; flex-direction: column; gap: 2px; font-size: 14px; }
      .mi-tx small { color: var(--mut); font-size: 12px; }
      .hint { font-size: 12.5px; color: var(--mut); margin: 4px 0 10px; }
      .infotext { font-size: 13.5px; line-height: 1.55; color: var(--ink); margin: 0 0 10px; }
      .modalinput { width: 100%; border: 1px solid var(--line); background: var(--surface2); color: var(--ink); border-radius: 12px; padding: 12px; font-size: 15px; font-family: inherit; }
      .modalinput::placeholder { color: var(--mut); }
      .confirmtext { font-size: 14px; color: var(--ink); margin: 0 0 4px; line-height: 1.45; }
      .csvbox { width: 100%; height: 150px; font-family: ui-monospace, Menlo, monospace; font-size: 11px; white-space: pre; background: var(--surface2); color: var(--ink); border: 1px solid var(--line); border-radius: 12px; padding: 10px; }
      .fileinput { display: block; width: 100%; font-size: 13px; margin-bottom: 10px; color: var(--mut); }
      .okmsg { color: #7ade9c; font-size: 13px; margin: 10px 0 4px; }
      .errmsg { color: #ff8f8f; font-size: 13px; margin: 10px 0 4px; }
      .dl { display: block; text-align: center; text-decoration: none; margin-top: 8px; }
    `);
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
