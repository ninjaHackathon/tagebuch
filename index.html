<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ernährungstagebuch</title>
<style> html, body, #root { height: 100%; } body { margin: 0; } </style>
<script>
  function showError(msg) {
    var el = document.getElementById("root");
    if (!el) return;
    el.innerHTML = '<div style="font-family:-apple-system,sans-serif;padding:20px;color:#9a1414;white-space:pre-wrap;line-height:1.5;font-size:14px;">' +
      '<strong>Fehler beim Laden</strong><br><br>' + msg +
      '<br><br><span style="color:#6b7472;">Bitte Screenshot davon schicken.</span></div>';
  }
  window.addEventListener("error", function (e) {
    if (e && e.target && e.target.tagName === "SCRIPT") {
      showError("Eine Skript-Datei konnte nicht geladen werden:\n" + (e.target.src || "unbekannt") + "\n\nBitte Internetverbindung prüfen (WLAN/Mobilfunk wechseln) und neu laden.");
    } else if (e && e.message) {
      showError(e.message + (e.filename ? ("\n" + e.filename + ":" + e.lineno) : ""));
    }
  }, true);
  window.addEventListener("unhandledrejection", function (e) {
    showError(e && e.reason ? String(e.reason) : "Unbekannter Fehler (Promise)");
  });
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="root"><div style="font-family:-apple-system,sans-serif;padding:24px;color:#6b7472;">Lädt Ernährungstagebuch …</div></div>
<script>
  setTimeout(function () {
    var el = document.getElementById("root");
    if (el && el.getAttribute("data-mounted") !== "true") {
      showError("Die Seite hat nach mehreren Sekunden nicht geladen.\n\nMögliche Ursache: eine benötigte Datei (React) konnte nicht geladen werden.");
    }
  }, 8000);
</script>
<script>
"use strict";
const { useState, useEffect, useRef } = React;
const h = React.createElement;
// ---------- Konfiguration ----------
const WEEKDAYS = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
const SEV_OPTIONS = [
    { v: "", label: "–", n: null },
    { v: "kein", label: "kein", n: 0 },
    { v: "bisschen", label: "bisschen", n: 1 },
    { v: "mittel", label: "mittel", n: 2 },
    { v: "viel", label: "viel", n: 3 },
];
const SEV_WORDS = ["kein", "bisschen", "mittel", "viel"];
const sevVal = (v) => {
    const o = SEV_OPTIONS.find((x) => x.v === v);
    return o ? o.n : null;
};
const SEV_COLS = [
    { id: "reflux_tag", label: "Reflux Tag" },
    { id: "reflux_nacht", label: "Reflux Nacht" },
    { id: "weinen_tag", label: "Weinen Tag" },
    { id: "weinen_abends", label: "Weinen Abends" },
];
const FOODS = [
    { id: "f_kapseln", label: "Kapseln" },
    { id: "f_eier", label: "Eier" },
    { id: "f_milch", label: "Milch" },
    { id: "f_lebertran", label: "Lebertran" },
    { id: "f_knochenbruehe", label: "Knochenbrühe" },
    { id: "f_nachtschatten", label: "Nachtschatten" },
    { id: "f_obst", label: "Obst" },
    { id: "f_rindfleisch", label: "Rindfleisch" },
];
const DEFAULT_NEM = ["Zn", "Mg", "Vit C", "Vit D", "Elektrolyte", "Jod", "Cu", "Se", "Vit B", "Bitter"];
const STORAGE_KEY = "ernaehrungstagebuch:v2";
// ---------- Datum ----------
const iso = (d) => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
};
const parseISO = (s) => {
    const [y, m, d] = s.split("-").map(Number);
    return new Date(y, m - 1, d);
};
const fmtShort = (s) => {
    const d = parseISO(s);
    return `${String(d.getDate()).padStart(2, "0")}.${String(d.getMonth() + 1).padStart(2, "0")}.`;
};
const fmtDay = (s) => `${WEEKDAYS[parseISO(s).getDay()]} ${fmtShort(s)}`;
const isWeekend = (s) => {
    const wd = parseISO(s).getDay();
    return wd === 0 || wd === 6;
};
function buildRange(minISO, maxISO) {
    const out = [];
    let d = parseISO(minISO);
    const end = parseISO(maxISO);
    while (d <= end) {
        out.push(iso(d));
        d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);
    }
    return out;
}
function parseCSV(text) {
    text = text.replace(/^\uFEFF/, "");
    const rows = [];
    let row = [];
    let field = "";
    let inQ = false;
    let i = 0;
    while (i < text.length) {
        const c = text[i];
        if (inQ) {
            if (c === '"') {
                if (text[i + 1] === '"') {
                    field += '"';
                    i += 2;
                    continue;
                }
                inQ = false;
                i++;
                continue;
            }
            field += c;
            i++;
            continue;
        }
        else {
            if (c === '"') {
                inQ = true;
                i++;
                continue;
            }
            if (c === ",") {
                row.push(field);
                field = "";
                i++;
                continue;
            }
            if (c === "\r") {
                i++;
                continue;
            }
            if (c === "\n") {
                row.push(field);
                rows.push(row);
                row = [];
                field = "";
                i++;
                continue;
            }
            field += c;
            i++;
            continue;
        }
    }
    row.push(field);
    rows.push(row);
    return rows.filter((r) => !(r.length === 1 && r[0] === ""));
}
// ---------- Speicher ----------
function loadState() {
    try {
        const v = localStorage.getItem(STORAGE_KEY);
        if (v)
            return JSON.parse(v);
    }
    catch (e) { }
    return null;
}
function saveState(state) {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    catch (e) { }
}
// ================= App =================
function App() {
    const [entries, setEntries] = useState({});
    const [customRows, setCustomRows] = useState([]);
    const [nemOptions, setNemOptions] = useState(DEFAULT_NEM);
    const [loaded, setLoaded] = useState(false);
    const [modal, setModal] = useState(null);
    const [analysis, setAnalysis] = useState(null);
    const [selectedDate, setSelectedDate] = useState(iso(new Date()));
    const [nemOpen, setNemOpen] = useState(false);
    const [showEarlier, setShowEarlier] = useState(false);
    const firstSave = useRef(true);
    const scrollRef = useRef(null);
    useEffect(() => {
        const r = document.getElementById("root");
        if (r)
            r.setAttribute("data-mounted", "true");
    }, []);
    useEffect(() => {
        (async () => {
            const saved = await loadState();
            const today = iso(new Date());
            let ent = saved?.entries || {};
            // Alte Einträge ohne type sind Häkchen-Zeilen (Auslöser)
            const cr = (saved?.customRows || saved?.customCols || []).map((r) => ({ ...r, type: r.type === "sev" ? "sev" : "check" }));
            const nem = saved?.nemOptions || DEFAULT_NEM;
            const keys = Object.keys(ent);
            const min = keys.length ? keys.sort()[0] : today;
            const range = buildRange(min, today);
            const next = { ...ent };
            range.forEach((d) => { if (!next[d])
                next[d] = emptyDay(); });
            setEntries(next);
            setCustomRows(cr);
            setNemOptions(nem);
            setLoaded(true);
        })();
    }, []);
    useEffect(() => {
        if (!loaded)
            return;
        if (firstSave.current) {
            firstSave.current = false;
            return;
        }
        saveState({ entries, customRows, nemOptions });
    }, [entries, customRows, nemOptions, loaded]);
    useEffect(() => {
        if (loaded && scrollRef.current) {
            scrollRef.current.scrollLeft = scrollRef.current.scrollWidth;
        }
    }, [loaded]);
    // "+ 7 Tage"-Sprechblase nur zeigen, wenn ganz nach links gescrollt
    useEffect(() => {
        if (!loaded)
            return;
        const el = scrollRef.current;
        if (!el)
            return;
        const onScroll = () => setShowEarlier(el.scrollLeft < 6);
        onScroll();
        el.addEventListener("scroll", onScroll, { passive: true });
        return () => el.removeEventListener("scroll", onScroll);
    }, [loaded]);
    const dates = Object.keys(entries).sort();
    const daysAsc = [...dates]; // aufsteigend: links Vergangenheit, rechts heute
    function emptyDay() {
        const d = { verstopfung: null, notiz: "", nem: [] };
        SEV_COLS.forEach((c) => (d[c.id] = ""));
        FOODS.forEach((f) => (d[f.id] = null));
        return d;
    }
    function update(date, id, value) {
        setEntries((p) => ({ ...p, [date]: { ...p[date], [id]: value } }));
    }
    function cycle(date, id) {
        setEntries((p) => {
            const cur = p[date][id];
            const next = cur == null ? true : cur === true ? false : null;
            return { ...p, [date]: { ...p[date], [id]: next } };
        });
    }
    function selectDay(d) {
        setSelectedDate(d);
        requestAnimationFrame(() => {
            const el = document.getElementById("day-" + d);
            if (el && el.scrollIntoView)
                el.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
        });
    }
    function applyAddRow(name, rowType) {
        setCustomRows((p) => [...p, { id: "c_" + Date.now(), label: name, type: rowType === "sev" ? "sev" : "check" }]);
    }
    function applyRenameRow(id, name) {
        setCustomRows((p) => p.map((r) => (r.id === id ? { ...r, label: name } : r)));
    }
    function applyDeleteRow(id) {
        setCustomRows((p) => p.filter((r) => r.id !== id));
        setEntries((p) => {
            const next = {};
            Object.keys(p).forEach((d) => {
                const e = { ...p[d] };
                delete e[id];
                next[d] = e;
            });
            return next;
        });
    }
    function applyRenameNem(oldName, name) {
        if (name === oldName)
            return;
        setNemOptions((p) => p.map((x) => (x === oldName ? name : x)));
        setEntries((p) => {
            const next = {};
            Object.keys(p).forEach((d) => {
                const e = p[d];
                next[d] = { ...e, nem: (e.nem || []).map((x) => (x === oldName ? name : x)) };
            });
            return next;
        });
    }
    function applyDeleteNem(name) {
        setNemOptions((p) => p.filter((x) => x !== name));
        setEntries((p) => {
            const next = {};
            Object.keys(p).forEach((d) => {
                const e = p[d];
                next[d] = { ...e, nem: (e.nem || []).filter((x) => x !== name) };
            });
            return next;
        });
    }
    function runModalAction(action, value) {
        if (action.kind === "addrow")
            applyAddRow(value, action.rowType);
        if (action.kind === "addnem")
            addNemOption(value);
        if (action.kind === "renamerow")
            applyRenameRow(action.id, value);
        if (action.kind === "delrow")
            applyDeleteRow(action.id);
        if (action.kind === "renamenem")
            applyRenameNem(action.name, value);
        if (action.kind === "delnem")
            applyDeleteNem(action.name);
        setModal(null);
    }
    function addEarlierDays() {
        setEntries((p) => {
            const keys = Object.keys(p).sort();
            const start = parseISO(keys[0]);
            const next = { ...p };
            for (let i = 1; i <= 7; i++) {
                const d = new Date(start.getFullYear(), start.getMonth(), start.getDate() - i);
                next[iso(d)] = emptyDay();
            }
            return next;
        });
        if (scrollRef.current)
            scrollRef.current.scrollLeft = 0;
    }
    function toggleNem(date, item) {
        setEntries((p) => {
            const cur = p[date].nem || [];
            const nem = cur.includes(item) ? cur.filter((x) => x !== item) : [...cur, item];
            return { ...p, [date]: { ...p[date], nem } };
        });
    }
    function addNemOption(name) {
        const n = name.trim();
        if (!n || nemOptions.includes(n))
            return;
        setNemOptions((p) => [...p, n]);
    }
    function exportCSV() {
        const cols = [
            { id: "date", label: "Datum" },
            ...SEV_COLS,
            { id: "verstopfung", label: "Kaki" },
            ...FOODS,
            { id: "nem", label: "NEM" },
            ...customRows,
            { id: "notiz", label: "Notizen" },
        ];
        const sevIds = new Set([...SEV_COLS.map((c) => c.id), ...customRows.filter((r) => r.type === "sev").map((r) => r.id)]);
        const esc = (s) => `"${String(s ?? "").replace(/"/g, '""')}"`;
        const tri = (v) => (v === true ? "ja" : v === false ? "nein" : "");
        const head = cols.map((c) => esc(c.label)).join(",");
        const rows = dates.map((d) => {
            const e = entries[d];
            return cols.map((c) => {
                if (c.id === "date")
                    return esc(d);
                if (c.id === "nem")
                    return esc((e.nem || []).join("; "));
                if (c.id === "notiz")
                    return esc(e.notiz || "");
                if (c.id === "verstopfung")
                    return esc(tri(e.verstopfung));
                if (sevIds.has(c.id))
                    return esc(e[c.id] || "");
                return esc(tri(e[c.id]));
            }).join(",");
        });
        const csv = [head, ...rows].join("\n");
        setModal({ type: "csv", csv });
    }
    function runAnalysis() {
        setAnalysis(analyze(entries, dates, customRows, nemOptions));
    }
    function importCSV(text) {
        let rows;
        try {
            rows = parseCSV(text);
        }
        catch (e) {
            return { ok: false, msg: "Datei konnte nicht gelesen werden." };
        }
        if (!rows || rows.length < 2)
            return { ok: false, msg: "Keine Daten gefunden." };
        const header = rows[0].map((x) => x.trim());
        const dateIdx = header.findIndex((x) => x.toLowerCase() === "datum");
        if (dateIdx < 0)
            return { ok: false, msg: 'Spalte "Datum" fehlt – ist das ein Export dieser App?' };
        const sevByLabel = {};
        SEV_COLS.forEach((c) => (sevByLabel[c.label] = c.id));
        const foodByLabel = {};
        FOODS.forEach((f) => (foodByLabel[f.label] = f.id));
        const customByLabel = {};
        customRows.forEach((c) => (customByLabel[c.label] = c));
        const newCustom = [];
        const colDesc = header.map((hd, i) => {
            if (i === dateIdx)
                return { kind: "date" };
            if (sevByLabel[hd])
                return { kind: "sev", id: sevByLabel[hd] };
            if (hd === "Kaki" || hd === "Verstopfung")
                return { kind: "check", id: "verstopfung" };
            if (foodByLabel[hd])
                return { kind: "check", id: foodByLabel[hd] };
            if (hd === "NEM")
                return { kind: "nem" };
            if (hd === "Notizen")
                return { kind: "notiz" };
            const existing = customByLabel[hd];
            if (existing)
                return { kind: existing.type === "sev" ? "sev" : "check", id: existing.id };
            // Unbekannte Spalte: Enthält sie nur Schweregrad-Wörter, ist es ein Symptom
            let any = false, allSev = true;
            for (let r = 1; r < rows.length; r++) {
                const v = (rows[r][i] || "").trim();
                if (!v)
                    continue;
                any = true;
                if (!SEV_WORDS.includes(v)) {
                    allSev = false;
                    break;
                }
            }
            const type = any && allSev ? "sev" : "check";
            const def = { id: "c_" + Date.now() + "_" + i, label: hd, type };
            newCustom.push(def);
            customByLabel[hd] = def;
            return { kind: type === "sev" ? "sev" : "check", id: def.id };
        });
        const imported = {};
        const nemSet = new Set(nemOptions);
        let count = 0;
        for (let r = 1; r < rows.length; r++) {
            const cells = rows[r];
            const date = (cells[dateIdx] || "").trim();
            if (!/^\d{4}-\d{2}-\d{2}$/.test(date))
                continue;
            const day = emptyDay();
            colDesc.forEach((cd, i) => {
                const val = (cells[i] !== undefined ? cells[i] : "").trim();
                if (cd.kind === "sev")
                    day[cd.id] = SEV_WORDS.includes(val) ? val : "";
                else if (cd.kind === "check")
                    day[cd.id] = val.toLowerCase() === "ja" ? true : val.toLowerCase() === "nein" ? false : null;
                else if (cd.kind === "nem") {
                    const arr = val ? val.split(";").map((x) => x.trim()).filter(Boolean) : [];
                    arr.forEach((x) => nemSet.add(x));
                    day.nem = arr;
                }
                else if (cd.kind === "notiz")
                    day.notiz = val;
            });
            imported[date] = day;
            count++;
        }
        if (count === 0)
            return { ok: false, msg: "Keine gültigen Tageszeilen gefunden." };
        setCustomRows((prev) => { const have = new Set(prev.map((c) => c.label)); return [...prev, ...newCustom.filter((c) => !have.has(c.label))]; });
        setNemOptions([...nemSet]);
        setEntries((prev) => {
            const merged = { ...prev, ...imported };
            const keys = Object.keys(merged).sort();
            const today = iso(new Date());
            const last = keys[keys.length - 1];
            const range = buildRange(keys[0], today > last ? today : last);
            range.forEach((d) => { if (!merged[d])
                merged[d] = emptyDay(); });
            return merged;
        });
        return { ok: true, msg: count + " Tage importiert. Vorhandene Tage mit gleichem Datum wurden überschrieben." };
    }
    if (!loaded)
        return h("div", { className: "loading" }, "Lädt…");
    const today = iso(new Date());
    const symptomRows = [
        ...SEV_COLS.map((c) => ({ ...c, type: "sev" })),
        { id: "verstopfung", label: "Kaki", type: "check" },
        ...customRows.filter((r) => r.type === "sev").map((r) => ({ ...r, custom: true })),
    ];
    const triggerRows = [
        ...FOODS.map((f) => ({ ...f, type: "check" })),
        ...customRows.filter((r) => r.type !== "sev").map((r) => ({ ...r, type: "check", custom: true })),
    ];
    // ----- Zellen-Rendering -----
    const lastDay = daysAsc[daysAsc.length - 1];
    function dayCls(d) {
        return (d === selectedDate ? " selcol" : "") + (d === today ? " today" : "") + (isWeekend(d) ? " we" : "") + (d === lastDay ? " lastc" : "");
    }
    function fillerCells() {
        return daysAsc.map((d) => h("td", { key: d, className: "dc fc" + dayCls(d), onClick: () => selectDay(d) }));
    }
    function gapRow(key) {
        return h("tr", { key, className: "gap" },
            h("td", { className: "sticky-l gaplabel" }),
            daysAsc.map((d) => h("td", { key: d, className: "dc" + dayCls(d) })));
    }
    function sevCell(d, row) {
        const e = entries[d];
        const v = e[row.id] || "";
        const chip = h("div", { className: "sevchip sev-" + (v || "none") });
        if (d !== selectedDate)
            return h("td", { key: d, className: "dc ro" + dayCls(d), onClick: () => selectDay(d) }, chip);
        return h("td", { key: d, className: "dc" + dayCls(d) },
            h("div", { className: "sevwrap" },
                chip,
                h("select", { className: "sevsel", value: v, onChange: (ev) => update(d, row.id, ev.target.value) }, SEV_OPTIONS.map((o) => h("option", { key: o.v, value: o.v }, o.label)))));
    }
    function checkMark(v) {
        if (v === true)
            return h("span", { className: "mk yes" }, "✓");
        if (v === false)
            return h("span", { className: "mk no" }, "–");
        return null;
    }
    function checkCell(d, row) {
        const v = entries[d][row.id];
        if (d !== selectedDate)
            return h("td", { key: d, className: "dc ro" + dayCls(d), onClick: () => selectDay(d) }, checkMark(v));
        return h("td", { key: d, className: "dc" + dayCls(d) },
            h("button", { className: "cellbtn", onClick: () => cycle(d, row.id) }, checkMark(v)));
    }
    function nemOptCell(d, opt) {
        const on = (entries[d].nem || []).includes(opt);
        const mark = on ? h("span", { className: "mk yes" }, "✓") : null;
        if (d !== selectedDate)
            return h("td", { key: d, className: "dc ro" + dayCls(d), onClick: () => selectDay(d) }, mark);
        return h("td", { key: d, className: "dc" + dayCls(d) },
            h("button", { className: "cellbtn", onClick: () => toggleNem(d, opt) }, mark));
    }
    function notizCell(d) {
        const has = !!entries[d].notiz;
        const mark = has ? h("span", { className: "notemark" }, "✎") : null;
        if (d !== selectedDate)
            return h("td", { key: d, className: "dc ro" + dayCls(d), onClick: () => selectDay(d) }, mark);
        return h("td", { key: d, className: "dc" + dayCls(d) },
            h("button", { className: "cellbtn", onClick: () => setModal({ type: "notiz", date: d }) }, mark || h("span", { className: "ph" }, "+")));
    }
    function labelCell(row, kind) {
        if (row.custom)
            return h("button", { className: "rowedit", onClick: () => setModal({ type: "rowedit", rowId: row.id, noun: kind }) },
                row.label, " ", h("span", { className: "editicon" }, "✎"));
        return row.label;
    }
    function dataRow(row, sec, kind) {
        return h("tr", { key: row.id, className: "sec-" + sec },
            h("td", { className: "rowlabel sticky-l" }, labelCell(row, kind)),
            daysAsc.map((d) => (row.type === "sev" ? sevCell(d, row) : checkCell(d, row))));
    }
    function sectionRow(key, label, sec) {
        return h("tr", { key, className: "secrow sec-" + sec },
            h("td", { className: "seclabel sticky-l" }, label),
            fillerCells());
    }
    function addRowTr(key, label, modalCfg, sec) {
        return h("tr", { key, className: "addtr seclast sec-" + sec },
            h("td", { className: "rowlabel sticky-l addcell" },
                h("button", { className: "addbtn", onClick: () => setModal(modalCfg) }, label)),
            fillerCells());
    }
    // ----- NEM-Gruppe -----
    const nemHead = h("tr", { key: "nemhead", className: "secrow sec-nem" + (nemOpen ? "" : " seclast") },
        h("td", { className: "seclabel sticky-l" },
            h("button", { className: "nemtoggle", onClick: () => setNemOpen(!nemOpen) },
                h("span", { className: "chev" + (nemOpen ? " open" : "") }, "▸"),
                " NEM")),
        nemOpen
            ? fillerCells()
            : daysAsc.map((d) => {
                const n = (entries[d].nem || []).length;
                const active = d === selectedDate;
                return h("td", {
                    key: d,
                    className: "dc ro nembadgecell" + dayCls(d),
                    onClick: () => (active ? setNemOpen(true) : selectDay(d)),

            parts.push(h("strong", { key: i }, m[1]), ln.slice(m[1].length));

// ================= Analyse =================
function analyze(entries, orderedDates, customRows, nemOptions) {
    // Alle NEM, die irgendwo eingetragen wurden (auch bereits gelöschte Optionen)
    const nemUsed = new Set(nemOptions);
    orderedDates.forEach((d) => (entries[d].nem || []).forEach((x) => nemUsed.add(x)));
    const sevRows = [...SEV_COLS, ...customRows.filter((r) => r.type === "sev")];
    const inputCols = [
        ...FOODS.map((f) => ({ id: f.id, label: f.label, kind: "check" })),
        ...customRows.filter((r) => r.type !== "sev").map((c) => ({ id: c.id, label: c.label, kind: "check" })),
        ...[...nemUsed].map((n) => ({ id: n, label: "NEM: " + n, kind: "nem" })),
    ];
    const load = {}, hasData = {}, constip = {}, idx = {};
    orderedDates.forEach((d, i) => (idx[d] = i));
    orderedDates.forEach((d) => {
        const e = entries[d] || {};
        let sum = 0, has = false;
        sevRows.forEach((c) => { const n = sevVal(e[c.id]); if (n !== null) {
            sum += n;
            has = true;
        } });
        load[d] = sum;
        hasData[d] = has;
        constip[d] = e.verstopfung === false;
    });
    const dataDays = orderedDates.filter((d) => hasData[d]);
    if (dataDays.length < 5) {
        return `Noch zu wenig Daten für eine Auswertung.\n\nBisher ${dataDays.length} Tag(e) mit erfassten Symptomen. Trage am besten mindestens 7–10 Tage durchgehend Symptome und Lebensmittel ein, dann werden mögliche Muster sichtbar.`;
    }
    const results = [], tooOften = [], notUsed = [];
    inputCols.forEach((col) => {
        const consumed = new Set();
        orderedDates.forEach((d) => {
            if (col.kind === "nem") {
                if ((entries[d].nem || []).includes(col.id))
                    consumed.add(d);
            }
            else if (entries[d][col.id] === true)
                consumed.add(d);
        });
        if (consumed.size === 0) {
            notUsed.push(col.label);
            return;
        }
        let expSum = 0, expN = 0, unSum = 0, unN = 0, expC = 0, unC = 0;
        dataDays.forEach((d) => {
            const i = idx[d];
            let exposed = false;
            for (let k = 0; k <= 3; k++) {
                const pd = orderedDates[i - k];
                if (pd && consumed.has(pd)) {
                    exposed = true;
                    break;
                }
            }
            if (exposed) {
                expSum += load[d];
                expN++;
                if (constip[d])
                    expC++;
            }
            else {
                unSum += load[d];
                unN++;
                if (constip[d])
                    unC++;
            }
        });
        if (expN < 2 || unN < 2) {
            if (expN >= 2 && unN < 2)
                tooOften.push(col.label);
            return;
        }
        const me = expSum / expN, mu = unSum / unN;
        results.push({ label: col.label, diff: me - mu, me, mu, constDiff: expC / expN - unC / unN });
    });
    results.sort((a, b) => b.diff - a.diff);
    const suspects = results.filter((r) => r.diff > 0.5);
    const calm = results.filter((r) => r.diff < -0.5);
    let out = `Auswertung über ${dataDays.length} Tage mit Symptomdaten.\nBerücksichtigt wird ein Nachwirken von bis zu 72 Stunden (Stillzeit).\n\n`;
    out += "MÖGLICHE AUSLÖSER (höhere Symptomlast in den 3 Tagen nach Verzehr/Einnahme – Lebensmittel und jedes NEM einzeln geprüft):\n";
    if (suspects.length === 0)
        out += "Kein Lebensmittel zeigt aktuell einen deutlichen Zusammenhang.\n";
    else
        suspects.slice(0, 5).forEach((r) => {
            const c = r.constDiff > 0.25 ? " · auch seltener Stuhlgang" : "";
            out += `• ${r.label}: Ø ${r.me.toFixed(1)} statt ${r.mu.toFixed(1)} Symptompunkte${c}\n`;
        });
    if (calm.length) {
        out += "\nEHER UNVERDÄCHTIG (Symptome tendenziell geringer):\n";
        calm.slice(0, 4).forEach((r) => { out += `• ${r.label}: Ø ${r.me.toFixed(1)} statt ${r.mu.toFixed(1)}\n`; });
    }
    if (tooOften.length)
        out += `\nNICHT BEURTEILBAR (fast täglich gegessen – es fehlen Vergleichstage ohne):\n${tooOften.join(", ")}\n`;
    if (notUsed.length)
        out += `\nNie erfasst: ${notUsed.join(", ")}\n`;
    if (suspects.length)
        out += `\nNÄCHSTER SCHRITT: Am aussagekräftigsten ist ein Auslassversuch. Lass „${suspects[0].label}" ein paar Tage konsequent weg und beobachte, ob die Symptome zurückgehen.`;
    out += "\n\nHinweis: Das sind statistische Muster, keine Beweise. Bei wenigen Tagen oder Lebensmitteln, die immer zusammen gegessen werden, können Scheinzusammenhänge entstehen. Anhaltende Beschwerden, Blut oder Schleim im Stuhl bitte kinderärztlich abklären.";
    return out;
}

      tr.sec-sym { --sc: var(--sym); --sc-soft: var(--sym-soft); }
      tr.sec-trig { --sc: var(--trig); --sc-soft: var(--trig-soft); }
      tr.sec-nem { --sc: var(--nem); --sc-soft: var(--nem-soft); }
      tr.sec-note { --sc: var(--note); --sc-soft: var(--note-soft); }
      tbody tr[class*="sec-"] > td:first-child { border-left: 2px solid var(--sc, transparent); }
      tbody tr[class*="sec-"] > td.lastc { border-right: 2px solid var(--sc, transparent); }
      tbody tr.secrow > td { border-top: 2px solid var(--sc, transparent); }
      tbody tr.seclast > td { border-bottom: 2px solid var(--sc, transparent); }

      .seclabel { position: sticky; left: 0; z-index: 2; font-size: 10.5px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; padding: 5px 10px; border-right: 1px solid var(--line); border-bottom: 1px solid #f1f5f9; min-width: var(--labelw); width: var(--labelw); white-space: nowrap; background: var(--sc-soft); color: var(--sc); }
      tr.secrow td.dc { background: var(--sc-soft); }
      tr.gap td { height: 8px; padding: 0; border: none; background: var(--card); }
      tr.gap td.dc { height: 8px; background: var(--card); border: none; }
      .gaplabel { z-index: 2; background: var(--card); min-width: var(--labelw); width: var(--labelw); }
      .nemtoggle { border: none; background: transparent; font: inherit; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--nem); cursor: pointer; padding: 0; display: inline-flex; align-items: center; gap: 5px; }
      .chev { display: inline-block; transition: transform .15s ease; font-size: 11px; }
      .chev.open { transform: rotate(90deg); }

      .addcell { border-bottom: 1px solid #f1f5f9; }
      tr.addtr td.dc { background: #fcfcfd; }
      .addbtn { border: 1.5px dashed #cbd5e1; background: transparent; color: var(--mut); font-size: 12px; font-weight: 700; border-radius: 16px; padding: 4px 10px; cursor: pointer; }
      .sec-sym .addbtn { color: var(--sym); border-color: #fed7aa; }
      .sec-trig .addbtn { color: var(--trig); border-color: #bae6fd; }
      .sec-nem .addbtn { color: var(--nem); border-color: #ddd6fe; }

      .dc { width: var(--colw); min-width: var(--colw); height: var(--rowh); padding: 0; background: var(--card);
        border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; text-align: center; vertical-align: middle;
        transition: min-width .15s ease, width .15s ease; }
      .dc.we { background: #f8fafc; }
      .dc.ro { cursor: pointer; }
      .dc.ro > * { opacity: .65; }
      .dc.selcol { width: var(--colw-sel); min-width: var(--colw-sel); background: #faf5ff;
        box-shadow: inset 2px 0 0 var(--accent), inset -2px 0 0 var(--accent); }

      .cellbtn { width: 100%; height: 100%; border: none; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; padding: 0; }
      .mk { display: inline-flex; align-items: center; justify-content: center; }
      .mk.yes { background: #334155; color: #fff; width: 20px; height: 20px; border-radius: 7px; font-size: 12px; font-weight: 800; }
      .mk.no { color: #94a3b8; font-size: 14px; font-weight: 700; }
      .ph { color: #cbd5e1; font-size: 14px; font-weight: 400; }
      .badge { background: #ddd6fe; color: #5b21b6; border-radius: 9px; min-width: 17px; height: 17px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; padding: 0 4px; }
      .notemark { color: #475569; font-size: 13px; }

      .sevwrap { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
      .sevchip { width: 20px; height: 20px; border-radius: 7px; border: 1.5px dashed #e2e8f0; background: transparent; margin: 0 auto; display: inline-block; vertical-align: middle; }
      .sevchip.sev-kein { background: var(--sev-kein); border: none; }
      .sevchip.sev-bisschen { background: var(--sev-bisschen); border: none; }
      .sevchip.sev-mittel { background: var(--sev-mittel); border: none; }
      .sevchip.sev-viel { background: var(--sev-viel); border: none; }
      .sevsel { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; border: none; appearance: none; -webkit-appearance: none; background: transparent; cursor: pointer; }

      .sheet-bg { position: fixed; inset: 0; background: rgba(30,27,75,.45); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
      .sheet { background: #fff; width: 100%; max-width: 460px; border-radius: 20px 20px 0 0; padding: 10px 16px 16px; box-shadow: 0 -8px 30px rgba(0,0,0,.2); animation: up .18s ease; }
      .grab { width: 38px; height: 4px; border-radius: 2px; background: #e2e8f0; margin: 2px auto 10px; }
      @keyframes up { from { transform: translateY(20px); opacity: .6 } to { transform: none; opacity: 1 } }
      .sheet-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 15px; }
      .x { border: none; background: #f1f5f9; width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; color: #475569; }

      .menuitem { display: flex; align-items: center; gap: 12px; width: 100%; border: 1px solid var(--line); background: #fff; border-radius: 14px; padding: 12px; margin-bottom: 8px; cursor: pointer; text-align: left; }
      .menuitem:active { background: #f8fafc; }
      .mi-ic { font-size: 20px; }
      .mi-tx { display: flex; flex-direction: column; gap: 2px; font-size: 14px; }
      .mi-tx small { color: var(--mut); font-size: 12px; }

      textarea { width: 100%; min-height: 120px; border: 1px solid var(--line); border-radius: 10px; padding: 10px; font-size: 14px; font-family: inherit; resize: vertical; }
      .analysis { max-width: 520px; }
      .analysis-body { white-space: pre-wrap; font-size: 13.5px; line-height: 1.5; color: #334155; max-height: 60vh; overflow-y: auto; }
      .analysis-body strong { color: var(--accent); }
      .hint { font-size: 12.5px; color: var(--mut); margin: 0 0 10px; }
      .csvbox { width: 100%; height: 150px; font-family: ui-monospace, Menlo, monospace; font-size: 11px; white-space: pre; }
      .dl { display: block; text-align: center; text-decoration: none; margin-top: 8px; }
      .rowedit { border: none; background: transparent; padding: 0; font: inherit; font-weight: inherit; color: inherit; cursor: pointer; }
      .editicon { color: #b6bdc9; font-size: 10px; }
      .btn.danger { color: #b91c1c; border-color: #fecaca; margin-top: 8px; }
      .modalinput { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 12px; font-size: 15px; }
      .confirmtext { font-size: 14px; color: #334155; margin: 0 0 4px; line-height: 1.45; }
      .btn:disabled { opacity: .45; cursor: default; }
      .fileinput { display: block; width: 100%; font-size: 13px; margin-bottom: 10px; }
      .okmsg { color: #15803d; font-size: 13px; margin: 10px 0 4px; }
      .errmsg { color: #b91c1c; font-size: 13px; margin: 10px 0 4px; }
    `);
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
