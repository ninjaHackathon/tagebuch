<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#141b2b" />
<title>Ernährungstagebuch</title>
<style> html, body, #root { height: 100%; } body { margin: 0; background: #141b2b; } </style>
<script>
  function showError(msg) {
    var el = document.getElementById("root");
    if (!el) return;
    el.innerHTML = '<div style="font-family:-apple-system,sans-serif;padding:20px;color:#ff9d9d;white-space:pre-wrap;line-height:1.5;font-size:14px;">' +
      '<strong>Fehler beim Laden</strong><br><br>' + msg +
      '<br><br><span style="color:#8b96ab;">Bitte Screenshot davon schicken.</span></div>';
  }
  window.addEventListener("error", function (e) {
    if (e && e.target && e.target.tagName === "SCRIPT") {
      showError("Eine Skript-Datei konnte nicht geladen werden:\n" + (e.target.src || "unbekannt") + "\n\nBitte Internetverbindung prüfen (WLAN/Mobilfunk wechseln) und neu laden.");
    } else if (e && e.message) {
      showError(e.message + (e.filename ? ("\n" + e.filename + ":" + e.lineno) : ""));
    }
  }, true);
  window.addEventListener("unhandledrejection", function (e) {
    showError(e && e.reason ? String(e.reason) : "Unbekannter Fehler (Promise)");
  });
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="root"><div style="font-family:-apple-system,sans-serif;padding:24px;color:#8b96ab;">Lädt Ernährungstagebuch …</div></div>
<script>
  setTimeout(function () {
    var el = document.getElementById("root");
    if (el && el.getAttribute("data-mounted") !== "true") {
      showError("Die Seite hat nach mehreren Sekunden nicht geladen.\n\nMögliche Ursache: eine benötigte Datei (React) konnte nicht geladen werden.");
    }
  }, 8000);
</script>
<script>
"use strict";
const { useState, useEffect, useRef } = React;
const h = React.createElement;
// ---------- Konfiguration ----------
const WEEKDAYS = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
const SEV_OPTIONS = [
    { v: "", label: "–", n: null },
    { v: "kein", label: "kein", n: 0 },
    { v: "bisschen", label: "bisschen", n: 1 },
    { v: "mittel", label: "mittel", n: 2 },
    { v: "viel", label: "viel", n: 3 },
];
const SEV_WORDS = ["kein", "bisschen", "mittel", "viel"];
const sevVal = (v) => {
    const o = SEV_OPTIONS.find((x) => x.v === v);
    return o ? o.n : null;
};
const SEV_COLS = [
    { id: "reflux_tag", label: "Reflux Tag" },
    { id: "reflux_nacht", label: "Reflux Nacht" },
    { id: "weinen_tag", label: "Weinen Tag" },
    { id: "weinen_abends", label: "Weinen Abends" },
];
const FOODS = [
    { id: "f_kapseln", label: "Kapseln" },
    { id: "f_eier", label: "Eier" },
    { id: "f_milch", label: "Milch" },
    { id: "f_lebertran", label: "Lebertran" },
    { id: "f_knochenbruehe", label: "Knochenbrühe" },
    { id: "f_nachtschatten", label: "Nachtschatten" },
    { id: "f_obst", label: "Obst" },
    { id: "f_rindfleisch", label: "Rindfleisch" },
];
const DEFAULT_NEM = ["Zn", "Mg", "Vit C", "Vit D", "Elektrolyte", "Jod", "Cu", "Se", "Vit B", "Bitter"];
const STORAGE_KEY = "ernaehrungstagebuch:v2";
// ---------- Datum ----------
const iso = (d) => {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
};
const parseISO = (s) => {
    const [y, m, d] = s.split("-").map(Number);
    return new Date(y, m - 1, d);
};
const fmtShort = (s) => {
    const d = parseISO(s);
    return `${String(d.getDate()).padStart(2, "0")}.${String(d.getMonth() + 1).padStart(2, "0")}.`;
};
const fmtDay = (s) => `${WEEKDAYS[parseISO(s).getDay()]} ${fmtShort(s)}`;
const addDays = (s, n) => {
    const d = parseISO(s);
    return iso(new Date(d.getFullYear(), d.getMonth(), d.getDate() + n));
};
function buildRange(minISO, maxISO) {
    const out = [];
    let d = parseISO(minISO);
    const end = parseISO(maxISO);
    while (d <= end) {
        out.push(iso(d));
        d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1);
    }
    return out;
}
function parseCSV(text) {
    text = text.replace(/^\uFEFF/, "");
    const rows = [];
    let row = [];
    let field = "";
    let inQ = false;
    let i = 0;
    while (i < text.length) {
        const c = text[i];
        if (inQ) {
            if (c === '"') {
                if (text[i + 1] === '"') {
                    field += '"';
                    i += 2;
                    continue;
                }
                inQ = false;
                i++;
                continue;
            }
            field += c;
            i++;
            continue;
        }
        else {
            if (c === '"') {
                inQ = true;
                i++;
                continue;
            }
            if (c === ",") {
                row.push(field);
                field = "";
                i++;
                continue;
            }
            if (c === "\r") {
                i++;
                continue;
            }
            if (c === "\n") {
                row.push(field);
                rows.push(row);
                row = [];
                field = "";
                i++;
                continue;
            }
            field += c;
            i++;
            continue;
        }
    }
    row.push(field);
    rows.push(row);
    return rows.filter((r) => !(r.length === 1 && r[0] === ""));
}
// ---------- Speicher ----------
function loadState() {
    try {
        const v = localStorage.getItem(STORAGE_KEY);
        if (v)
            return JSON.parse(v);
    }
    catch (e) { }
    return null;
}
function saveState(state) {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }
    catch (e) { }
}
// ---------- Icons (Inline-SVG) ----------
function svg(cls, ...children) {
    return h("svg", { className: cls, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.8, strokeLinecap: "round", strokeLinejoin: "round", "aria-hidden": true }, ...children);
}
const ICONS = {
    sun: (cls) => svg(cls, h("circle", { cx: 12, cy: 12, r: 4 }), h("path", { d: "M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" })),
    chart: (cls) => svg(cls, h("path", { d: "M4 20V12" }), h("path", { d: "M10 20V5" }), h("path", { d: "M16 20v-6" }), h("path", { d: "M22 20H2" })),
    bulb: (cls) => svg(cls, h("path", { d: "M9.5 18h5" }), h("path", { d: "M10.5 21h3" }), h("path", { d: "M12 3a6 6 0 0 0-3.9 10.6c.6.5 1.4 1.3 1.4 2.4h5c0-1.1.8-1.9 1.4-2.4A6 6 0 0 0 12 3z" })),
    gear: (cls) => svg(cls, h("circle", { cx: 12, cy: 12, r: 3.2 }), h("path", { d: "M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.3 5.3l2.1 2.1M16.6 16.6l2.1 2.1M5.3 18.7l2.1-2.1M16.6 7.4l2.1-2.1" })),
    pulse: (cls) => svg(cls, h("polyline", { points: "2 12 7 12 10 5 14 19 17 12 22 12" })),
    apple: (cls) => svg(cls, h("path", { d: "M12 7c-3.2-2.8-8-.8-8 4 0 4.6 3.8 9 8 9s8-4.4 8-9c0-4.8-4.8-6.8-8-4z" }), h("path", { d: "M12 7c0-2.2 1.2-3.5 3-4" })),
    pill: (cls) => svg(cls, h("rect", { x: 3, y: 8.5, width: 18, height: 7, rx: 3.5 }), h("path", { d: "M12 8.5v7" })),
    pencil: (cls) => svg(cls, h("path", { d: "M17 3l4 4L8 20l-5 1 1-5L17 3z" })),
    left: (cls) => svg(cls, h("polyline", { points: "14 5 7 12 14 19" })),
    right: (cls) => svg(cls, h("polyline", { points: "10 5 17 12 10 19" })),
};
// ================= App =================
function App() {
    const [entries, setEntries] = useState({});
    const [customRows, setCustomRows] = useState([]);
    const [nemOptions, setNemOptions] = useState(DEFAULT_NEM);
    const [loaded, setLoaded] = useState(false);
    const [view, setView] = useState("day");
    const [selectedDate, setSelectedDate] = useState(iso(new Date()));
    const [modal, setModal] = useState(null);
    const [editCard, setEditCard] = useState(null); // "sym" | "trig" | "nem" | null
    const firstSave = useRef(true);
    const weekScrollRef = useRef(null);
    useEffect(() => {
        const r = document.getElementById("root");
        if (r)
            r.setAttribute("data-mounted", "true");
    }, []);
    useEffect(() => {
        (async () => {
            const saved = await loadState();
            const today = iso(new Date());
            let ent = saved?.entries || {};
            // Alte Einträge ohne type sind Häkchen-Zeilen (Auslöser)
            const cr = (saved?.customRows || saved?.customCols || []).map((r) => ({ ...r, type: r.type === "sev" ? "sev" : "check" }));
            const nem = saved?.nemOptions || DEFAULT_NEM;
            const keys = Object.keys(ent);
            const min = keys.length ? keys.sort()[0] : today;
            const range = buildRange(min, today);
            const next = { ...ent };
            range.forEach((d) => { if (!next[d])
                next[d] = emptyDay(); });
            setEntries(next);
            setCustomRows(cr);
            setNemOptions(nem);
            setLoaded(true);
        })();
    }, []);
    useEffect(() => {
        if (!loaded)
            return;
        if (firstSave.current) {
            firstSave.current = false;
            return;
        }
        saveState({ entries, customRows, nemOptions });
    }, [entries, customRows, nemOptions, loaded]);
    // Datums-Chip der Auswahl sichtbar halten
    useEffect(() => {
        if (!loaded || view !== "day")
            return;
        const el = document.getElementById("chip-" + selectedDate);
        if (el && el.scrollIntoView)
            el.scrollIntoView({ inline: "center", block: "nearest" });
    }, [selectedDate, view, loaded]);
    // Verlauf: rechts (heute) starten
    useEffect(() => {
        if (loaded && view === "week" && weekScrollRef.current)
            weekScrollRef.current.scrollLeft = weekScrollRef.current.scrollWidth;
    }, [view, loaded]);
    const dates = Object.keys(entries).sort();
    const today = iso(new Date());
    function emptyDay() {
        const d = { verstopfung: null, notiz: "", nem: [] };
        SEV_COLS.forEach((c) => (d[c.id] = ""));
        FOODS.forEach((f) => (d[f.id] = null));
        return d;
    }
    function update(date, id, value) {
        setEntries((p) => ({ ...p, [date]: { ...p[date], [id]: value } }));
    }
    function cycle(date, id) {
        setEntries((p) => {
            const cur = p[date][id];
            const next = cur == null ? true : cur === true ? false : null;
            return { ...p, [date]: { ...p[date], [id]: next } };
        });
    }
    function toggleNem(date, item) {
        setEntries((p) => {
            const cur = p[date].nem || [];
            const nem = cur.includes(item) ? cur.filter((x) => x !== item) : [...cur, item];
            return { ...p, [date]: { ...p[date], nem } };
        });
    }
    function gotoDate(d) {
        setEntries((p) => (p[d] ? p : { ...p, [d]: emptyDay() }));
        setSelectedDate(d);
        setView("day");
    }
    function applyAddRow(name, rowType) {
        setCustomRows((p) => [...p, { id: "c_" + Date.now(), label: name, type: rowType === "sev" ? "sev" : "check" }]);
    }
    function applyRenameRow(id, name) {
        setCustomRows((p) => p.map((r) => (r.id === id ? { ...r, label: name } : r)));
    }
    function applyDeleteRow(id) {
        setCustomRows((p) => p.filter((r) => r.id !== id));
        setEntries((p) => {
            const next = {};
            Object.keys(p).forEach((d) => {
                const e = { ...p[d] };
                delete e[id];
                next[d] = e;
            });
            return next;
        });
    }
    function applyRenameNem(oldName, name) {
        if (name === oldName)
            return;
        setNemOptions((p) => p.map((x) => (x === oldName ? name : x)));
        setEntries((p) => {
            const next = {};
            Object.keys(p).forEach((d) => {
                const e = p[d];
                next[d] = { ...e, nem: (e.nem || []).map((x) => (x === oldName ? name : x)) };
            });
            return next;
        });
    }
    function applyDeleteNem(name) {
        setNemOptions((p) => p.filter((x) => x !== name));
        setEntries((p) => {
            const next = {};
            Object.keys(p).forEach((d) => {
                const e = p[d];
                next[d] = { ...e, nem: (e.nem || []).filter((x) => x !== name) };
            });
            return next;
        });
    }
    function addNemOption(name) {
        const n = name.trim();
        if (!n || nemOptions.includes(n))
            return;
        setNemOptions((p) => [...p, n]);
    }
    function runModalAction(action, value) {
        if (action.kind === "addrow")
            applyAddRow(value, action.rowType);
        if (action.kind === "addnem")
            addNemOption(value);
        if (action.kind === "renamerow")
            applyRenameRow(action.id, value);
        if (action.kind === "delrow")
            applyDeleteRow(action.id);
        if (action.kind === "renamenem")
            applyRenameNem(action.name, value);
        if (action.kind === "delnem")
            applyDeleteNem(action.name);
        setModal(null);
    }
    function exportCSV() {
        const cols = [
            { id: "date", label: "Datum" },
            ...SEV_COLS,
            { id: "verstopfung", label: "Kaki" },
            ...FOODS,
            { id: "nem", label: "NEM" },
            ...customRows,
            { id: "notiz", label: "Notizen" },
        ];
        const sevIds = new Set([...SEV_COLS.map((c) => c.id), ...customRows.filter((r) => r.type === "sev").map((r) => r.id)]);
        const esc = (s) => `"${String(s ?? "").replace(/"/g, '""')}"`;
        const tri = (v) => (v === true ? "ja" : v === false ? "nein" : "");
        const head = cols.map((c) => esc(c.label)).join(",");
        const rows = dates.map((d) => {
            const e = entries[d];
            return cols.map((c) => {
                if (c.id === "date")
                    return esc(d);
                if (c.id === "nem")
                    return esc((e.nem || []).join("; "));
                if (c.id === "notiz")
                    return esc(e.notiz || "");
                if (c.id === "verstopfung")
                    return esc(tri(e.verstopfung));
                if (sevIds.has(c.id))
                    return esc(e[c.id] || "");
                return esc(tri(e[c.id]));
            }).join(",");
        });
        const csv = [head, ...rows].join("\n");
        setModal({ type: "csv", csv });
    }
    function importCSV(text) {
        let rows;
        try {
            rows = parseCSV(text);
        }
        catch (e) {
            return { ok: false, msg: "Datei konnte nicht gelesen werden." };
        }
        if (!rows || rows.length < 2)
            return { ok: false, msg: "Keine Daten gefunden." };
        const header = rows[0].map((x) => x.trim());
        const dateIdx = header.findIndex((x) => x.toLowerCase() === "datum");
        if (dateIdx < 0)
            return { ok: false, msg: 'Spalte "Datum" fehlt – ist das ein Export dieser App?' };
        const sevByLabel = {};
        SEV_COLS.forEach((c) => (sevByLabel[c.label] = c.id));
        const foodByLabel = {};
        FOODS.forEach((f) => (foodByLabel[f.label] = f.id));
        const customByLabel = {};
        customRows.forEach((c) => (customByLabel[c.label] = c));
        const newCustom = [];
        const colDesc = header.map((hd, i) => {
            if (i === dateIdx)
                return { kind: "date" };
            if (sevByLabel[hd])
                return { kind: "sev", id: sevByLabel[hd] };
            if (hd === "Kaki" || hd === "Verstopfung")
                return { kind: "check", id: "verstopfung" };
            if (foodByLabel[hd])
                return { kind: "check", id: foodByLabel[hd] };
            if (hd === "NEM")
                return { kind: "nem" };
            if (hd === "Notizen")
                return { kind: "notiz" };
            const existing = customByLabel[hd];
            if (existing)
                return { kind: existing.type === "sev" ? "sev" : "check", id: existing.id };
            // Unbekannte Spalte: Enthält sie nur Schweregrad-Wörter, ist es ein Symptom
            let any = false, allSev = true;
            for (let r = 1; r < rows.length; r++) {
                const v = (rows[r][i] || "").trim();
                if (!v)
                    continue;
                any = true;
                if (!SEV_WORDS.includes(v)) {
                    allSev = false;
                    break;
                }
            }
            const type = any && allSev ? "sev" : "check";
            const def = { id: "c_" + Date.now() + "_" + i, label: hd, type };
            newCustom.push(def);
            customByLabel[hd] = def;
            return { kind: type === "sev" ? "sev" : "check", id: def.id };
        });
        const imported = {};
        const nemSet = new Set(nemOptions);
        let count = 0;
        for (let r = 1; r < rows.length; r++) {
            const cells = rows[r];
            const date = (cells[dateIdx] || "").trim();
            if (!/^\d{4}-\d{2}-\d{2}$/.test(date))
                continue;
            const day = emptyDay();
            colDesc.forEach((cd, i) => {
                const val = (cells[i] !== undefined ? cells[i] : "").trim();
                if (cd.kind === "sev")
                    day[cd.id] = SEV_WORDS.includes(val) ? val : "";
                else if (cd.kind === "check")
                    day[cd.id] = val.toLowerCase() === "ja" ? true : val.toLowerCase() === "nein" ? false : null;
                else if (cd.kind === "nem") {
                    const arr = val ? val.split(";").map((x) => x.trim()).filter(Boolean) : [];
                    arr.forEach((x) => nemSet.add(x));
                    day.nem = arr;
                }
                else if (cd.kind === "notiz")
                    day.notiz = val;
            });
            imported[date] = day;
            count++;
        }
        if (count === 0)
            return { ok: false, msg: "Keine gültigen Tageszeilen gefunden." };
        setCustomRows((prev) => { const have = new Set(prev.map((c) => c.label)); return [...prev, ...newCustom.filter((c) => !have.has(c.label))]; });
        setNemOptions([...nemSet]);
        setEntries((prev) => {
            const merged = { ...prev, ...imported };
            const keys = Object.keys(merged).sort();
            const today2 = iso(new Date());
            const last = keys[keys.length - 1];
            const range = buildRange(keys[0], today2 > last ? today2 : last);
            range.forEach((d) => { if (!merged[d])
                merged[d] = emptyDay(); });
            return merged;
        });
        return { ok: true, msg: count + " Tage importiert. Vorhandene Tage mit gleichem Datum wurden überschrieben." };
    }
    if (!loaded)
        return h("div", { className: "loading" }, "Lädt…");
    const e = entries[selectedDate] || emptyDay();
    const symRows = [...SEV_COLS.map((c) => ({ ...c, type: "sev" })), ...customRows.filter((r) => r.type === "sev").map((r) => ({ ...r, custom: true }))];
    const trigRows = [...FOODS.map((f) => ({ ...f, type: "check" })), ...customRows.filter((r) => r.type !== "sev").map((r) => ({ ...r, type: "check", custom: true }))];
    // ---------- Tages-Ansicht ----------
    function editTap(row, noun) {
        setModal({ type: "rowedit", rowId: row.id, noun });
    }
    function dayView() {
        const isToday = selectedDate === today;
        return h("div", { className: "page" },
            h("div", { className: "datebar" },
                h("button", { className: "arrowbtn", "aria-label": "Vortag", onClick: () => gotoDate(addDays(selectedDate, -1)) }, ICONS.left("nico")),
                h("div", { className: "dchips", id: "dchips" }, dates.map((d) => h("button", {
                    key: d,
                    id: "chip-" + d,
                    className: "dchip" + (d === selectedDate ? " sel" : "") + (d === today ? " istoday" : ""),
                    onClick: () => gotoDate(d),
                },
                    h("span", { className: "wd" }, d === today ? "Heute" : WEEKDAYS[parseISO(d).getDay()]),
                    h("span", { className: "dt" }, fmtShort(d))))),
                h("button", { className: "arrowbtn", "aria-label": "Folgetag", disabled: isToday, onClick: () => !isToday && gotoDate(addDays(selectedDate, 1)) }, ICONS.right("nico"))),
            !isToday && h("div", { className: "jumpbar" },
                h("span", { className: "jumptxt" }, "Du bearbeitest ", h("strong", null, fmtDay(selectedDate))),
                h("button", { className: "jumpbtn", onClick: () => gotoDate(today) }, "Zu heute")),
            // --- Symptome ---
            h("section", { className: "card card-sym" },
                ICONS.pulse("watermark"),
                h("div", { className: "cardhead" },
                    h("h2", null, "Symptome"),
                    h("button", { className: "editbtn" + (editCard === "sym" ? " on" : ""), "aria-label": "Symptome bearbeiten", onClick: () => setEditCard(editCard === "sym" ? null : "sym") }, ICONS.pencil("nico"))),
                editCard === "sym" && h("p", { className: "edithint" }, "Antippen zum Umbenennen oder Löschen (nur eigene Symptome)."),
                symRows.map((row) => h("div", { className: "symrow", key: row.id },
                    h("div", { className: "symlabel" },
                        editCard === "sym" && row.custom
                            ? h("button", { className: "editable", onClick: () => editTap(row, "Symptom") }, row.label, " ✎")
                            : h("span", { className: editCard === "sym" && !row.custom ? "dimlabel" : "" }, row.label)),
                    h("div", { className: "segs" }, SEV_WORDS.map((w) => h("button", {
                        key: w,
                        className: "seg seg-" + w + (e[row.id] === w ? " on" : ""),
                        onClick: () => update(selectedDate, row.id, e[row.id] === w ? "" : w),
                    }, w))))),
                h("div", { className: "symrow" },
                    h("div", { className: "symlabel" }, h("span", null, "Kaki")),
                    h("div", { className: "segs segs2" }, [["ja", true], ["nein", false]].map(([lab, val]) => h("button", {

// ================= Analyse =================
function analyzeStructured(entries, orderedDates, customRows, nemOptions) {
    // Alle NEM, die irgendwo eingetragen wurden (auch bereits gelöschte Optionen)
    const nemUsed = new Set(nemOptions);
    orderedDates.forEach((d) => (entries[d].nem || []).forEach((x) => nemUsed.add(x)));
    const sevRows = [...SEV_COLS, ...customRows.filter((r) => r.type === "sev")];
    const inputCols = [
        ...FOODS.map((f) => ({ id: f.id, label: f.label, kind: "check" })),
        ...customRows.filter((r) => r.type !== "sev").map((c) => ({ id: c.id, label: c.label, kind: "check" })),
        ...[...nemUsed].map((n) => ({ id: n, label: "NEM: " + n, kind: "nem" })),
    ];
    const load = {}, hasData = {}, constip = {}, idx = {};
    orderedDates.forEach((d, i) => (idx[d] = i));
    orderedDates.forEach((d) => {
        const e = entries[d] || {};
        let sum = 0, has = false;
        sevRows.forEach((c) => { const n = sevVal(e[c.id]); if (n !== null) {
            sum += n;
            has = true;
        } });
        load[d] = sum;
        hasData[d] = has;
        constip[d] = e.verstopfung === false;
    });
    const dataDays = orderedDates.filter((d) => hasData[d]);
    const out = { dataDays: dataDays.length, enough: dataDays.length >= 5, suspects: [], calm: [], tooOften: [], notUsed: [] };
    if (!out.enough)
        return out;
    const results = [];
    inputCols.forEach((col) => {
        const consumed = new Set();
        orderedDates.forEach((d) => {
            if (col.kind === "nem") {
                if ((entries[d].nem || []).includes(col.id))
                    consumed.add(d);
            }
            else if (entries[d][col.id] === true)
                consumed.add(d);
        });
        if (consumed.size === 0) {
            out.notUsed.push(col.label);
            return;
        }
        let expSum = 0, expN = 0, unSum = 0, unN = 0, expC = 0, unC = 0;
        dataDays.forEach((d) => {
            const i = idx[d];
            let exposed = false;
            for (let k = 0; k <= 3; k++) {
                const pd = orderedDates[i - k];
                if (pd && consumed.has(pd)) {
                    exposed = true;
                    break;
                }
            }
            if (exposed) {
                expSum += load[d];
                expN++;
                if (constip[d])
                    expC++;
            }
            else {
                unSum += load[d];
                unN++;
                if (constip[d])
                    unC++;
            }
        });
        if (expN < 2 || unN < 2) {
            if (expN >= 2 && unN < 2)
                out.tooOften.push(col.label);
            return;
        }
        const me = expSum / expN, mu = unSum / unN;
        results.push({ label: col.label, diff: me - mu, me, mu, constFlag: expC / expN - unC / unN > 0.25 });
    });
    results.sort((a, b) => b.diff - a.diff);
    out.suspects = results.filter((r) => r.diff > 0.5);
    out.calm = results.filter((r) => r.diff < -0.5).sort((a, b) => a.diff - b.diff);
    return out;
}

      .appname { font-size: 17px; font-weight: 800; letter-spacing: -0.01em; }
      .appsub { font-size: 11.5px; color: var(--mut); margin-top: 1px; }
      .gearbtn { border: none; background: var(--surface2); color: var(--mut); width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
      .nico { width: 20px; height: 20px; }

      .page { padding: 2px 0 8px; }

      /* Datums-Navigation */
      .datebar { display: flex; align-items: center; gap: 4px; padding: 6px 8px 0; }
      .arrowbtn { border: none; background: var(--surface2); color: var(--ink); width: 36px; height: 44px; border-radius: 14px; cursor: pointer; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; }
      .arrowbtn:disabled { opacity: .35; }
      .dchips { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; flex: 1; padding: 2px; }
      .dchips::-webkit-scrollbar { display: none; }
      .dchip { flex: 0 0 auto; border: 1.5px solid transparent; background: var(--surface); border-radius: 14px; padding: 5px 11px; text-align: center; cursor: pointer; }
      .dchip .wd { display: block; font-size: 10px; font-weight: 700; color: var(--mut); }
      .dchip .dt { display: block; font-size: 12.5px; font-weight: 800; color: var(--ink); margin-top: 1px; }
      .dchip.istoday { border-color: rgba(195,214,63,.55); }
      .dchip.istoday .wd { color: var(--lime); }
      .dchip.sel { background: var(--lime); border-color: var(--lime); }
      .dchip.sel .wd, .dchip.sel .dt { color: var(--lime-ink); }

      .jumpbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 10px 12px 0; background: var(--surface); border-radius: 14px; padding: 9px 12px; font-size: 12.5px; color: var(--mut); }
      .jumpbar strong { color: var(--ink); }
      .jumpbtn { border: 1.5px solid var(--lime); color: var(--lime); background: transparent; border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 800; cursor: pointer; }

      /* Karten */
      .card { position: relative; overflow: hidden; border-radius: 24px; padding: 16px 16px 18px; margin: 12px 12px 0; color: #fff; }
      .card-sym { background: var(--c-sym); }
      .card-trig { background: var(--c-trig); }
      .card-nem { background: var(--c-nem); }
      .card-note { background: var(--c-note); }
      .watermark { position: absolute; right: -14px; bottom: -18px; width: 110px; height: 110px; opacity: .18; pointer-events: none; }
      .cardhead { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      .card h2 { margin: 0; font-size: 21px; font-weight: 800; letter-spacing: -0.01em; }
      .cardsub { margin: 4px 0 0; font-size: 12px; color: rgba(255,255,255,.75); position: relative; }
      .edithint { margin: 8px 0 0; font-size: 12px; color: rgba(255,255,255,.9); background: rgba(0,0,0,.18); border-radius: 10px; padding: 6px 10px; position: relative; }
      .editbtn { border: none; background: rgba(0,0,0,.18); color: rgba(255,255,255,.85); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
      .editbtn.on { background: #fff; color: #333; }
      .editbtn .nico { width: 16px; height: 16px; }

      /* Symptome: Segmente */
      .symrow { margin-top: 13px; position: relative; }
      .symlabel { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
      .symlabel .editable { border: none; background: rgba(0,0,0,.18); color: #fff; font: inherit; border-radius: 999px; padding: 3px 10px; cursor: pointer; }
      .dimlabel { opacity: .85; }
      .segs { display: flex; gap: 3px; background: rgba(0,0,0,.22); border-radius: 999px; padding: 3px; }
      .segs2 { max-width: 220px; }
      .seg { flex: 1; border: none; background: transparent; color: rgba(255,255,255,.8); font-size: 12.5px; font-weight: 700; padding: 8px 0; border-radius: 999px; cursor: pointer; }
      .seg.on.seg-kein { background: var(--sev-kein); color: #0b3018; }
      .seg.on.seg-bisschen { background: var(--sev-bisschen); color: #2c3a08; }
      .seg.on.seg-mittel { background: var(--sev-mittel); color: #4a1e02; }
      .seg.on.seg-viel { background: var(--sev-viel); color: #fff; }
      .seg.segneutral.on { background: #fff; color: #333; }

      /* Chips */
      .chipgrid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; position: relative; }
      .chip { border: 1.5px solid rgba(255,255,255,.55); background: transparent; color: #fff; border-radius: 999px; padding: 9px 14px; font-size: 13.5px; font-weight: 700; cursor: pointer; }
      .card-trig .chip.yes { background: #fff; border-color: #fff; color: var(--c-trig-deep); }
      .card-nem .chip.yes { background: #fff; border-color: #fff; color: var(--c-nem-deep); }
      .chip.no { background: rgba(0,0,0,.25); border-color: transparent; color: rgba(255,255,255,.6); text-decoration: line-through; }
      .chip.editable { border-style: solid; background: rgba(0,0,0,.18); border-color: transparent; }
      .chip.lockchip { opacity: .45; border-style: solid; }
      .addchip { margin-top: 14px; border: 1.5px dashed rgba(255,255,255,.6); background: transparent; color: #fff; border-radius: 999px; padding: 9px 16px; font-size: 13.5px; font-weight: 800; cursor: pointer; position: relative; }

      /* Notiz */
      .notearea { width: 100%; min-height: 90px; margin-top: 12px; border: none; border-radius: 14px; background: rgba(0,0,0,.2); color: #fff; padding: 12px; font-size: 14px; font-family: inherit; resize: vertical; position: relative; }
      .notearea::placeholder { color: rgba(255,255,255,.55); }
      .notearea:focus { outline: 2px solid rgba(255,255,255,.45); }
      .modalinput:focus, .csvbox:focus { outline: 2px solid rgba(195,214,63,.5); }

      /* Verlauf */
      .weekintro { padding: 10px 16px 0; }
      .pagetitle { margin: 0; font-size: 21px; font-weight: 800; }
      .pagesub { margin: 3px 0 0; font-size: 12.5px; color: var(--mut); }
      .legend { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin: 10px 16px 0; font-size: 11px; }
      .lg { padding: 2px 9px; border-radius: 20px; font-weight: 700; }
      .lg-kein { background: var(--sev-kein); color: #0b3018; }
      .lg-bisschen { background: var(--sev-bisschen); color: #2c3a08; }
      .lg-mittel { background: var(--sev-mittel); color: #4a1e02; }
      .lg-viel { background: var(--sev-viel); color: #fff; }
      .wscroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 10px 12px 0; border-radius: 18px; background: var(--surface); }
      .wtable { border-collapse: separate; border-spacing: 0; }
      .wsticky { position: sticky; left: 0; background: var(--surface); z-index: 2; }
      .wcorner { min-width: 104px; width: 104px; border-bottom: 1px solid var(--line); }
      .wday { min-width: 34px; width: 34px; padding: 6px 0 5px; border-bottom: 1px solid var(--line); vertical-align: bottom; cursor: pointer; }
      .wdv { writing-mode: vertical-rl; transform: rotate(180deg); white-space: nowrap; display: inline-block; line-height: 1; }
      .wwd { font-size: 10px; font-weight: 700; color: var(--mut); }
      .wdt { font-size: 11px; font-weight: 700; color: var(--ink); margin-top: 3px; }
      .wday.wtoday .wwd, .wday.wtoday .wdt { color: var(--lime); }
      .wseclabel { font-size: 10.5px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; padding: 8px 12px 4px; white-space: nowrap; }
      .wsec-sym .wseclabel { color: var(--c-sym); }
      .wsec-trig .wseclabel { color: var(--c-trig); }
      .wsec-nem .wseclabel { color: var(--c-nem); }
      .wsec-note .wseclabel { color: var(--c-note); }
      .wlabel { font-size: 12px; font-weight: 600; padding: 0 12px; white-space: nowrap; height: 32px; border-right: 1px solid var(--line); min-width: 104px; width: 104px; }
      .wc { text-align: center; vertical-align: middle; height: 32px; min-width: 34px; cursor: pointer; border-bottom: 1px solid rgba(50,64,88,.35); }
      .wc.wtoday { background: rgba(195,214,63,.07); }
      .wsq { display: inline-block; width: 17px; height: 17px; border-radius: 6px; }
      .wsq.sev-none { border: 1.5px dashed var(--line); }
      .wsq.sev-kein { background: var(--sev-kein); }
      .wsq.sev-bisschen { background: var(--sev-bisschen); }
      .wsq.sev-mittel { background: var(--sev-mittel); }
      .wsq.sev-viel { background: var(--sev-viel); }
      .wdot { color: var(--ink); font-size: 12px; font-weight: 800; }
      .wno { color: var(--mut); font-weight: 700; }
      .wnote { color: var(--mut); font-size: 12px; }

      /* Analyse */
      .acard { background: var(--surface); border-radius: 20px; padding: 14px 16px; margin: 12px 12px 0; }
      .acard-next { border: 1.5px solid rgba(195,214,63,.5); }
      .ahead { margin: 0; font-size: 15px; font-weight: 800; color: var(--ink); }
      .ah-hot { color: var(--c-sym); }
      .ah-cool { color: var(--c-nem); }
      .ah-lime { color: var(--lime); }
      .ahint { margin: 3px 0 0; font-size: 12px; color: var(--mut); }
      .atext { margin: 8px 0 0; font-size: 13.5px; line-height: 1.5; color: var(--ink); }
      .resrow { margin-top: 12px; }
      .reslabel { font-size: 13.5px; font-weight: 700; }
      .resflag { font-size: 11.5px; font-weight: 600; color: var(--mut); }
      .resbars { margin-top: 5px; display: flex; flex-direction: column; gap: 3px; }
      .resline { display: flex; align-items: center; gap: 8px; }
      .resleg { font-size: 10.5px; color: var(--mut); width: 42px; flex: 0 0 auto; text-align: right; }
      .barwrap { flex: 1; display: flex; align-items: center; gap: 7px; }
      .bar { height: 9px; border-radius: 5px; min-width: 3px; }
      .b-hot { background: var(--c-sym); }
      .b-cool { background: var(--surface2); }
      .barval { font-size: 11px; color: var(--mut); font-weight: 700; }
      .achips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
      .achip { background: var(--surface2); color: var(--ink); border-radius: 999px; padding: 4px 11px; font-size: 12px; font-weight: 600; }
      .disclaimer { margin: 14px 16px 0; font-size: 11.5px; line-height: 1.5; color: var(--mut); }

      /* Bottom-Nav */
      .bottomnav { position: fixed; left: 0; right: 0; bottom: 0; background: #101624; border-top: 1px solid #202b41;
        display: flex; justify-content: space-around; padding: 7px 10px calc(7px + env(safe-area-inset-bottom)); z-index: 30; }
      .navitem { border: none; background: transparent; color: var(--mut); display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10.5px; font-weight: 700; cursor: pointer; padding: 3px 16px; border-radius: 12px; }
      .navico { width: 23px; height: 23px; }
      .navitem.active { color: var(--lime); }

      /* Sheets */
      .sheet-bg { position: fixed; inset: 0; background: rgba(5,8,15,.6); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
      .sheet { background: var(--surface); color: var(--ink); width: 100%; max-width: 460px; border-radius: 20px 20px 0 0; padding: 10px 16px 20px; box-shadow: 0 -8px 30px rgba(0,0,0,.4); animation: up .18s ease; }
      .grab { width: 38px; height: 4px; border-radius: 2px; background: var(--surface2); margin: 2px auto 10px; }
      @keyframes up { from { transform: translateY(20px); opacity: .6 } to { transform: none; opacity: 1 } }
      .sheet-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 15px; }
      .x { border: none; background: var(--surface2); color: var(--mut); width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; }
      .btn { border: 1px solid var(--line); background: var(--surface2); color: var(--ink); padding: 9px 13px; border-radius: 14px; font-size: 13.5px; font-weight: 700; cursor: pointer; }
      .btn:active { transform: translateY(1px); }
      .btn.primary { background: var(--lime); color: var(--lime-ink); border-color: var(--lime); }
      .btn.wide { width: 100%; margin-top: 10px; padding: 13px; }
      .btn.danger { color: #ff8f8f; border-color: #5c3038; background: transparent; }
      .btn:disabled { opacity: .45; cursor: default; }
      .menuitem { display: flex; align-items: center; gap: 12px; width: 100%; border: 1px solid var(--line); background: transparent; color: var(--ink); border-radius: 16px; padding: 13px; margin-bottom: 8px; cursor: pointer; text-align: left; }
      .mi-ic { font-size: 20px; }
      .mi-tx { display: flex; flex-direction: column; gap: 2px; font-size: 14px; }
      .mi-tx small { color: var(--mut); font-size: 12px; }
      .hint { font-size: 12.5px; color: var(--mut); margin: 4px 0 10px; }
      .modalinput { width: 100%; border: 1px solid var(--line); background: var(--surface2); color: var(--ink); border-radius: 12px; padding: 12px; font-size: 15px; }
      .modalinput::placeholder { color: var(--mut); }
      .confirmtext { font-size: 14px; color: var(--ink); margin: 0 0 4px; line-height: 1.45; }
      .csvbox { width: 100%; height: 150px; font-family: ui-monospace, Menlo, monospace; font-size: 11px; white-space: pre; background: var(--surface2); color: var(--ink); border: 1px solid var(--line); border-radius: 12px; padding: 10px; }
      .fileinput { display: block; width: 100%; font-size: 13px; margin-bottom: 10px; color: var(--mut); }
      .okmsg { color: #7ade9c; font-size: 13px; margin: 10px 0 4px; }
      .errmsg { color: #ff8f8f; font-size: 13px; margin: 10px 0 4px; }
      .dl { display: block; text-align: center; text-decoration: none; margin-top: 8px; }
    `);
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
